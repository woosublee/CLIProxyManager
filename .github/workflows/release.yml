name: Release DMG

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to upload the DMG to, for example v0.1.2-beta.3
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-dmg:
    name: Build and upload DMG
    runs-on: macos-14

    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          DISPATCH_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEASE_TAG="$DISPATCH_TAG"
          else
            RELEASE_TAG="$GITHUB_REF_NAME"
          fi
          [[ "$RELEASE_TAG" == v* ]]
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release-tag.outputs.release_tag }}

      - name: Resolve release metadata
        run: |
          VERSION=${RELEASE_TAG#v}
          BUILD_NUMBER=${{ github.run_number }}
          DMG_PATH="build/CLIProxyManager-${VERSION}.dmg"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "DMG_PATH=$DMG_PATH" >> "$GITHUB_ENV"

      - name: Test
        run: swift test

      - name: Build and verify ad-hoc signed DMG
        run: make CODESIGN_IDENTITY=- VERSION="$VERSION" BUILD_NUMBER="$BUILD_NUMBER" verify-dmg

      - name: Upload DMG to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --verify-tag --title "CLIProxyManager $VERSION" --notes "Ad-hoc signed, non-notarized DMG."
          gh release upload "$RELEASE_TAG" "$DMG_PATH" --clobber
